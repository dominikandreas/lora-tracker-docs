name: Deploy documentation to Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: dominikandreas/lora-tracker
          ref: main
          path: _source
          persist-credentials: false
      - name: Install documentation and WebAssembly build tools
        run: |
          python -m pip install --disable-pip-version-check Markdown==3.8.2
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y emscripten
      - name: Render authoritative source documentation
        run: python scripts/render_source_docs.py --source _source --output _site
      - name: Mirror latest factory images for browser flashing
        run: |
          python - <<'PY'
          import json
          import pathlib
          import urllib.request

          api = urllib.request.Request(
              "https://api.github.com/repos/dominikandreas/lora-tracker/releases/latest",
              headers={"Accept": "application/vnd.github+json", "User-Agent": "lora-tracker-docs"},
          )
          with urllib.request.urlopen(api) as response:
              release = json.load(response)
          output = pathlib.Path("_site/firmware")
          output.mkdir(parents=True, exist_ok=True)
          images = [asset for asset in release["assets"] if asset["name"].endswith(".factory.bin")]
          if not images:
              raise SystemExit(f"Release {release['tag_name']} has no factory images")
          for asset in images:
              request = urllib.request.Request(
                  asset["browser_download_url"],
                  headers={"Accept": "application/octet-stream", "User-Agent": "lora-tracker-docs"},
              )
              with urllib.request.urlopen(request) as response:
                  (output / asset["name"]).write_bytes(response.read())
          print(f"Mirrored {len(images)} factory images from {release['tag_name']}")
          PY
      - name: Build the browser Network Lab
        run: |
          make -C _source/components/simulator-web wasm
          mkdir -p _site/simulator
          cp -a _source/components/simulator-web/app/. _site/simulator/
      - name: Assemble static site
        run: cp -a *.html *.css *.js .nojekyll assets _site/
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
